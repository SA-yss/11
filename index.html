<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>서울옥션 디자인팀 창고재고관리</title>

  <link rel="icon" type="image/png" sizes="32x32" href="images/sa-icon-4.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/sa-icon-4.png">
  <link rel="shortcut icon" href="favicon.ico">

  <link rel="apple-touch-icon" href="images/sa-icon-4.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/sa-icon-4.png">

  <meta name="application-name" content="서울옥션 디자인팀 창고재고관리">
  <meta name="apple-mobile-web-app-title" content="서울옥션 디자인팀 창고재고관리">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="./site.webmanifest?v=4">
  <link rel="stylesheet" href="style.css">
</head>

<body class="preboot">
  <div class="wrap">
    <div class="topbar" id="topbar">
      <div class="brand">
        <a href="#/" id="homeLink"><h1 id="topTitle">창고수량재고</h1></a>
      </div>

      <div class="search" id="searchBox">
        <input id="q" placeholder="품목 검색" />
        <div class="pill" id="doSearch">검색</div>
      </div>

      <div class="topbarLogo" id="topbarLogo">
        <img src="images/sa-logo-5.jpg" alt="SeoulAuction">
      </div>
    </div>

    <div id="app"></div>
  </div>

  <nav class="bottomNav" aria-label="하단 탐색">
    <button class="bottomNavBtn" id="navBack" type="button" aria-label="뒤로가기">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M14.5 6l-6 6 6 6"/>
      </svg>
    </button>

    <button class="bottomNavBtn" id="navForward" type="button" aria-label="앞으로가기">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9.5 6l6 6-6 6"/>
      </svg>
    </button>

    <button class="bottomNavBtn" id="navHome" type="button" aria-label="홈">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 10.5 12 4l8 6.5"/>
        <path d="M6.5 9.5V20h11V9.5"/>
      </svg>
    </button>

    <button class="bottomNavBtn" id="navReload" type="button" aria-label="새로고침">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
        <path d="M21 3v6h-6"/>
      </svg>
    </button>
  </nav>

  <div class="modal" id="itemModal" aria-hidden="true">
    <div class="modalOverlay" id="itemOverlay"></div>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="품목 추가">
      <div class="sheetHead">
        <div>품목 추가</div>
        <button class="sheetClose" id="itemClose">닫기</button>
      </div>

      <div class="sheetBody">
        <div class="field">
          <label for="nCategory">카테고리</label>
          <input id="nCategory" placeholder="예) 쇼핑백" />
        </div>

        <div class="field">
          <label for="nName">품목명</label>
          <input id="nName" placeholder="예) 신규 쇼핑백" />
        </div>

        <div class="field">
          <label for="nSize">사이즈</label>
          <input id="nSize" placeholder="예) 480*180*380mm" />
        </div>

        <div class="field">
          <label for="nBase">기준재고</label>
          <input id="nBase" inputmode="numeric" placeholder="예) 1000" />
        </div>

        <div class="field">
          <label for="nImgFile">이미지 업로드</label>
          <input id="nImgFile" type="file" accept="image/*" />
          <div id="nImgFileName" style="margin-top:6px; font-size:12px; color:#666;">선택된 파일 없음</div>
          <div id="nImgPreviewBox" class="nImgPreviewBox" style="display:none;">
            <img id="nImgPreview" alt="업로드 미리보기">
          </div>
        </div>
      </div>

      <div class="sheetFoot">
        <button class="btn primary" id="createItemBtn">추가</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
